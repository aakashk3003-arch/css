<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          .container {
            height: 300px;
            width: 350px;
            margin-top: 250px;
            margin-left: 500;
            border: 1px solid black;
            background-image: linear-gradient(red 10%,orange) ;
            border-radius:10px ;
            cursor: pointer;
            color: white;
            transition: ease-in 1.5s;
          
          }
          .container :hover{
            transform:skew(200deg);
            rotate: x(5deg);
          }

          .container h1,p{
            opacity: 0;
          }
          .container:h1,p{
            opacity: 1;
          }

            h1,p{
                opacity: 0;

            }

    </style>
</head>
<body style="background-color: back;">
    <div class="container">
    <h1>3D Animation Card</h1>
    <p>this card rotatesin 3D.scales up, and revales text with smooth tranction</p>
    </div>
</body>
</html>
